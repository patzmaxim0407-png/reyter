<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Тест PhotoSwipe</title>
  
  <!-- PhotoSwipe CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/4.1.3/photoswipe.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/4.1.3/default-skin/default-skin.min.css">
  
  <!-- Swiper CSS -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/Swiper/4.5.0/css/swiper.min.css">
  
  <!-- Modal CSS -->
  <link rel="stylesheet" href="styles/modal.css">
  
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .test-card {
      border: 1px solid #ccc;
      padding: 20px;
      margin: 20px;
      cursor: pointer;
      max-width: 300px;
    }
    .test-card:hover {
      background-color: #f0f0f0;
    }
  </style>
</head>
<body>

<h1>Тест PhotoSwipe модального вікна</h1>

<div class="test-card" onclick="openModal(this)"
     data-name="Тестовий товар 1"
     data-price="1250"
     data-description="Опис тестового товару"
     data-article="TEST-001"
     data-status="В наявності"
     data-images="/assets/images/boxers/1.webp,/assets/images/boxers/2.webp,/assets/images/boxers/3.webp">
  <h3>Клікніть щоб відкрити модальне вікно</h3>
  <p>Товар: Тестовий товар 1</p>
  <p>Ціна: 1250 грн</p>
</div>

<!-- Modal Window -->
<div id="productModal" class="modalAll hidden">
  <div class="modalBox">
    <button class="closeBtn" onclick="closeModal()">✕</button>
    
    <div class="modalLeft">
      <div class="mainImage">
        <img id="modalImage" src="" alt="" data-large="">
        <img class="clone" src="" alt="">
      </div>
      <div class="thumbsContainer">
        <div id="thumbsVertical" class="swiper-container">
          <div class="swiper-wrapper"></div>
          <div class="swiper-button-next"></div>
          <div class="swiper-button-prev"></div>
        </div>
      </div>
    </div>
    
    <div class="modalRight">
      <h2 id="modalName"></h2>
      <p id="modalArticle" class="article"></p>
      <p id="modalStatus" class="status"></p>
      <div id="modalDescription" class="description"></div>
      <div class="price" id="modalPrice"></div>
    </div>
  </div>
</div>

<!-- PhotoSwipe DOM -->
<div class="pswp" tabindex="-1" role="dialog" aria-hidden="true">
  <div class="pswp__bg"></div>
  <div class="pswp__scroll-wrap">
    <div class="pswp__container">
      <div class="pswp__item"></div>
      <div class="pswp__item"></div>
      <div class="pswp__item"></div>
    </div>
    <div class="pswp__ui pswp__ui--hidden">
      <div class="pswp__top-bar">
        <div class="pswp__counter"></div>
        <button class="pswp__button pswp__button--close" title="Close (Esc)"></button>
        <button class="pswp__button pswp__button--share" title="Share"></button>
        <button class="pswp__button pswp__button--fs" title="Toggle fullscreen"></button>
        <button class="pswp__button pswp__button--zoom" title="Zoom in/out"></button>
        <div class="pswp__preloader">
          <div class="pswp__preloader__icn">
            <div class="pswp__preloader__cut">
              <div class="pswp__preloader__donut"></div>
            </div>
          </div>
        </div>
      </div>
      <div class="pswp__share-modal pswp__share-modal--hidden pswp__single-tap">
        <div class="pswp__share-tooltip"></div>
      </div>
      <button class="pswp__button pswp__button--arrow--left" title="Previous (arrow left)"></button>
      <button class="pswp__button pswp__button--arrow--right" title="Next (arrow right)"></button>
      <div class="pswp__caption">
        <div class="pswp__caption__center"></div>
      </div>
    </div>
  </div>
</div>

<!-- jQuery -->
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>

<!-- PhotoSwipe JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/4.1.3/photoswipe.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/photoswipe/4.1.3/photoswipe-ui-default.min.js"></script>

<!-- Swiper JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/Swiper/4.5.0/js/swiper.min.js"></script>

<!-- Modal Script -->
<script src="scripts/modal-NEW.js"></script>

<script>
  // Перевірка завантаження бібліотек
  console.log('PhotoSwipe loaded:', typeof PhotoSwipe !== 'undefined');
  console.log('PhotoSwipeUI_Default loaded:', typeof PhotoSwipeUI_Default !== 'undefined');
  console.log('Swiper loaded:', typeof Swiper !== 'undefined');
</script>

</body>
</html>
